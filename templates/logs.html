<!DOCTYPE html>
<html>
<head>
    <title>Audit Logs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-4">

<h2>📜 Audit Logs</h2>

<table class="table table-dark table-striped mt-3">

<tr>
    <th>ID</th>
    <th>Action</th>
    <th>Module</th>
    <th>Details</th>
    <th>Timestamp</th>
</tr>

{% for log in logs %}
<tr>
    <td>{{ log.id }}</td>
    <td>{{ log.action }}</td>
    <td>{{ log.module }}</td>
    <td>{{ log.details }}</td>
    <td>{{ log.timestamp }}</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
