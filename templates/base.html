<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %} PivotForge {% endblock %}
    </title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-dark pf-navbar">
    <div class="container">

        <!-- Brand -->
        <a class="navbar-brand fw-bold text-danger" href="{{ url_for('dashboard') }}">
            🛡 PivotForge
        </a>

        <!-- Mobile toggle -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Menu -->
        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav ms-auto align-items-lg-center">

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('assets') }}">Assets</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('vulnerabilities') }}">Vulnerabilities</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('relationships') }}">Relationships</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('attack_paths') }}">Attack Paths</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('graph') }}">Graph</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('reports') }}">Reports</a>
                </li>

                <!-- Executive Dashboard -->
                <li class="nav-item">
                    <a class="nav-link text-info fw-semibold" href="{{ url_for('executive_dashboard') }}">
                        Executive Dashboard
                    </a>
                </li>

                              <li class="nav-item">
    <a class="nav-link" href="/logs">Logs</a>
</li>


                <!-- Search Icon -->
                <li class="nav-item ms-3">
                    <a class="nav-link fs-5" href="{{ url_for('search') }}" title="Global Search">
                        🔍
                    </a>
                </li>

  
            </ul>
        </div>
    </div>
</nav>

<!-- ================= CONTENT ================= -->
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<!-- ================= FOOTER ================= -->
<footer class="footer-custom text-center mt-5 py-3 border-top small">
    PivotForge — Attack Path Intelligence Platform <br>
    Developed By: ©
    <a href="https://github.com/Mohitshah1122" target="_blank">
        Mohitshah1122
    </a>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
