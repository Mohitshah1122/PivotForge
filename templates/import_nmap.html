<!DOCTYPE html>

<html>

<head>

    <title>Nmap Import</title>

</head>

<body>

<h2>Import Nmap XML Scan</h2>

<form
    method="POST"
    enctype="multipart/form-data"
>

<input
type="file"
name="scan"
accept=".xml"
required>

<br><br>

<button type="submit">

Import Scan

</button>

</form>

</body>

</html>
